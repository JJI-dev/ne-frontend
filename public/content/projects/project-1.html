<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; color: #0a0a0a; }
  .section { margin-bottom: 48px; }
  h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.04em; }
  p { font-size: 15px; line-height: 1.85; color: #333; letter-spacing: -0.04em; }
  .image-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
  .image-placeholder { aspect-ratio: 16/9; background: #f0f0f0; border: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 13px; }
</style>
</head>
<body>
  <div class="section">
    <h2>프로젝트 개요</h2>
    <p>여기에 프로젝트 상세 내용을 자유롭게 HTML로 작성하세요. 이미지, 영상, 텍스트 등 다양한 요소를 추가할 수 있습니다.</p>
  </div>
  <div class="section">
    <h2>주요 기능</h2>
    <p>프로젝트의 핵심 기능과 기술 스택을 설명합니다.</p>
    <div class="image-row">
      <div class="image-placeholder">이미지 1</div>
      <div class="image-placeholder">이미지 2</div>
    </div>
  </div>
  <div class="section">
    <h2>결과</h2>
    <p>프로젝트 결과 및 성과를 기재합니다.</p>
  </div>
</body>
</html>
